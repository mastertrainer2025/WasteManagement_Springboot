<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Register - Eco-Waste Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-bg">

    <div class="auth-card" style="max-width: 500px;">
        <div class="text-center mb-4">
            <a th:href="@{/}" class="text-decoration-none">
                <div class="d-inline-flex align-items-center justify-content-center p-3 bg-success bg-opacity-10 rounded-circle mb-2">
                    <i class="bi bi-person-plus-fill fs-1 text-success"></i>
                </div>
                <h3 class="fw-bold text-success m-0">Citizen Register</h3>
            </a>
            <p class="text-secondary small mt-2">Create an account to manage your municipal collections</p>
        </div>

        <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <div th:text="${error}">An error occurred during registration.</div>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label for="name" class="form-label small fw-semibold text-secondary">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-secondary"></i></span>
                    <input type="text" class="form-control border-start-0" id="name" th:field="*{name}" placeholder="John Doe" required autofocus>
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label small fw-semibold text-secondary">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-secondary"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" th:field="*{email}" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label small fw-semibold text-secondary">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-telephone text-secondary"></i></span>
                    <input type="tel" class="form-control border-start-0" id="phone" th:field="*{phone}" placeholder="+1 (555) 000-0000" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label small fw-semibold text-secondary">Residential Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-geo-alt text-secondary"></i></span>
                    <input type="text" class="form-control border-start-0" id="address" th:field="*{address}" placeholder="123 Green St, Sector 4" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-semibold text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-secondary"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" th:field="*{password}" placeholder="Create password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-eco w-100 py-2">Create Citizen Account</button>
        </form>

        <div class="text-center mt-4 small text-secondary">
            Already have an account? <a th:href="@{/login}" class="text-success fw-semibold">Sign in instead</a>
        </div>
    </div>

</body>
</html>
